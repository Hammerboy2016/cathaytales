name: scheduled-publish

on:
  schedule:
    - cron: '*/5 * * * *'  # GitHub Actions 最小间隔 5min（实际可能延迟 5-15min）
  workflow_dispatch:       # 允许手动触发兜底

permissions:
  contents: write

concurrency:
  group: scheduled-publish
  cancel-in-progress: false

jobs:
  cherry-pick:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git author (keep wangcai identity)
        run: |
          git config user.name "wangcai"
          git config user.email "wudecangyu@163.com"

      - name: Cherry-pick due pending commits
        run: |
          set -e
          NOW_HM=$(TZ=Asia/Shanghai date +%H:%M)
          TODAY=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          BRANCH="pending-${TODAY}"

          echo "Now: $NOW_HM | Today: $TODAY | Target branch: $BRANCH"

          if ! git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "No pending branch for today, exit cleanly."
            exit 0
          fi

          git fetch origin "$BRANCH":"$BRANCH"

          PICKED=0
          for SHA in $(git rev-list --reverse main.."$BRANCH"); do
            MSG=$(git log -1 --format=%B "$SHA")
            FIRSTLINE=$(echo "$MSG" | head -1)
            SCHEDULED=$(echo "$FIRSTLINE" | grep -oE '\[scheduled:[0-9]{2}:[0-9]{2}\]' | head -1 | sed 's/\[scheduled://; s/\]//')

            # 已 cherry-pick 过的去重（main 上文件已存在则跳过）
            ADDED_FILES=$(git diff-tree --no-commit-id --name-only -r "$SHA" --diff-filter=A)
            ALREADY=false
            for F in $ADDED_FILES; do
              if git cat-file -e "main:$F" 2>/dev/null; then
                ALREADY=true; break
              fi
            done
            if [ "$ALREADY" = "true" ]; then
              echo "Skip $SHA: file already published in main."
              continue
            fi

            if [ -z "$SCHEDULED" ]; then
              echo "Skip $SHA: no [scheduled:HH:MM] tag."
              continue
            fi

            if [[ "$NOW_HM" < "$SCHEDULED" ]]; then
              echo "Skip $SHA (scheduled $SCHEDULED, now $NOW_HM): not due yet."
              continue
            fi

            echo "Cherry-pick due: $SHA (scheduled $SCHEDULED, now $NOW_HM)"
            CLEAN_MSG=$(echo "$FIRSTLINE" | sed -E 's/ ?\[scheduled:[0-9]{2}:[0-9]{2}\]//')
            git cherry-pick "$SHA" --no-commit
            git commit -m "$CLEAN_MSG"
            PICKED=$((PICKED+1))
          done

          if [ "$PICKED" -gt 0 ]; then
            git push origin main
            echo "Published $PICKED commit(s) to main."
          else
            echo "Nothing due."
          fi
