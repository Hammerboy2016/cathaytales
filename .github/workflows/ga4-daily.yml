name: GA4 Daily Report

on:
  workflow_dispatch:
    inputs:
      days:
        description: '回溯天数'
        required: false
        default: '30'
      report:
        description: '报表类型 (all/overview/daily/toppages/sources/countries/devices)'
        required: false
        default: 'all'
  schedule:
    # 北京时间 10:00 = UTC 02:00
    - cron: '0 2 * * *'

jobs:
  ga4-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet google-analytics-data

      - name: Write SA credentials
        env:
          SA_JSON: ${{ secrets.GA4_SA_JSON }}
        run: |
          printf '%s' "$SA_JSON" > ga4_sa.json
          chmod 600 ga4_sa.json
          # 校验是不是合法 JSON
          python -c "import json; json.load(open('ga4_sa.json'))" && echo "✓ SA JSON 合法"

      - name: Run GA4 query
        env:
          GA4_SA_PATH: ${{ github.workspace }}/ga4_sa.json
          DAYS: ${{ github.event.inputs.days || '30' }}
          REPORT: ${{ github.event.inputs.report || 'all' }}
        run: |
          python scripts/ga4_query.py --days "$DAYS" --report "$REPORT" | tee ga4_report.txt

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ga4-report-${{ github.run_id }}
          path: ga4_report.txt
          retention-days: 30

      - name: Cleanup credentials
        if: always()
        run: rm -f ga4_sa.json
