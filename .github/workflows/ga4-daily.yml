name: GA4 Daily Report

on:
  workflow_dispatch:
    inputs:
      days:
        description: '回溯天数'
        required: false
        default: '30'
      report:
        description: '报表类型 (all/overview/daily/toppages/sources/countries/devices)'
        required: false
        default: 'all'
      send_mail:
        description: '是否发邮件 (true/false)。日报合并后默认不发，仅手动应急'
        required: false
        default: 'false'
  schedule:
    # 北京时间 06:30 = UTC 22:30（前一天）
    # 给旺财日报 07:00 留 30 分钟缓冲拉取
    - cron: '30 22 * * *'

permissions:
  contents: write   # 允许 commit reports/ga4_latest.txt 回 main

jobs:
  ga4-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet google-analytics-data

      - name: Write SA credentials
        env:
          SA_JSON: ${{ secrets.GA4_SA_JSON }}
        run: |
          printf '%s' "$SA_JSON" > ga4_sa.json
          chmod 600 ga4_sa.json
          python -c "import json; json.load(open('ga4_sa.json'))" && echo "✓ SA JSON 合法"

      - name: Run GA4 query
        env:
          GA4_SA_PATH: ${{ github.workspace }}/ga4_sa.json
          DAYS: ${{ github.event.inputs.days || '30' }}
          REPORT: ${{ github.event.inputs.report || 'all' }}
        run: |
          python scripts/ga4_query.py --days "$DAYS" --report "$REPORT" | tee ga4_report.txt

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ga4-report-${{ github.run_id }}
          path: ga4_report.txt
          retention-days: 30

      - name: Commit report to reports/ga4_latest.txt
        if: success()
        run: |
          mkdir -p reports
          BJ_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S CST')
          {
            echo "# GA4 Daily Report (auto-generated)"
            echo "# Generated: $BJ_TIME"
            echo "# Workflow run: ${{ github.run_id }}"
            echo "# Source: .github/workflows/ga4-daily.yml"
            echo "# ---"
            cat ga4_report.txt
          } > reports/ga4_latest.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/ga4_latest.txt
          if git diff --staged --quiet; then
            echo "reports/ga4_latest.txt 无变化，跳过 commit"
          else
            git commit -m "chore(reports): auto-update GA4 daily report @ $BJ_TIME"
            git push origin main
            echo "✓ 已推 reports/ga4_latest.txt 到 main"
          fi

      - name: Send report via email (163 SMTP, 默认关闭)
        if: ${{ github.event.inputs.send_mail == 'true' }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          REPORT_PATH: ga4_report.txt
        run: |
          if [ -z "$SMTP_HOST" ] || [ -z "$SMTP_PASS" ]; then
            echo "::warning::SMTP secrets 未配置，跳过发邮件"
            exit 0
          fi
          python scripts/ga4_mailer.py

      - name: Cleanup credentials
        if: always()
        run: rm -f ga4_sa.json
